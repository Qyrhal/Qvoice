<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Qvoice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      padding: 10px;
      width: 100%;
      min-height: 100%;
    }

    /* ── Glass Panel ─────────────────────────────────────────── */
    .panel {
      background: rgba(11, 11, 13, 0.78);
      backdrop-filter: blur(60px) saturate(180%) brightness(0.85);
      -webkit-backdrop-filter: blur(60px) saturate(180%) brightness(0.85);
      border: 0.5px solid rgba(255, 255, 255, 0.09);
      border-radius: 18px;
      padding: 16px 20px 18px;
      box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.6),
        0 24px 48px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      -webkit-app-region: drag;
      will-change: transform, opacity;
    }

    .panel.entering {
      animation: slideIn 0.22s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    .panel.exiting {
      animation: slideOut 0.18s ease-in forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateY(0)   scale(1);    }
      to   { opacity: 0; transform: translateY(-5px) scale(0.97); }
    }

    /* ── Status Row ──────────────────────────────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      -webkit-app-region: no-drag;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-record  { background: #ff3b30; box-shadow: 0 0 6px #ff3b3066; animation: blink 1.2s ease-in-out infinite; }
    .dot-process { background: #ffd60a; }
    .dot-correct { background: #bf5af2; }
    .dot-done    { background: #30d158; }
    .dot-idle    { background: rgba(255,255,255,0.2); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .status-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      -webkit-app-region: no-drag;
    }

    /* ── Waveform ─────────────────────────────────────────────── */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 38px;
      margin-top: 14px;
      -webkit-app-region: no-drag;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.55);
      height: 4px;
      transition: height 0.06s ease-out;
    }

    /* Idle breathing animation for bars before mic activates */
    .waveform.idle .bar { animation: breath 2s ease-in-out infinite; }
    .waveform.idle .bar:nth-child(1)  { animation-delay: 0.0s; }
    .waveform.idle .bar:nth-child(2)  { animation-delay: 0.1s; }
    .waveform.idle .bar:nth-child(3)  { animation-delay: 0.2s; }
    .waveform.idle .bar:nth-child(4)  { animation-delay: 0.3s; }
    .waveform.idle .bar:nth-child(5)  { animation-delay: 0.4s; }
    .waveform.idle .bar:nth-child(6)  { animation-delay: 0.5s; }
    .waveform.idle .bar:nth-child(7)  { animation-delay: 0.6s; }
    .waveform.idle .bar:nth-child(8)  { animation-delay: 0.5s; }
    .waveform.idle .bar:nth-child(9)  { animation-delay: 0.4s; }
    .waveform.idle .bar:nth-child(10) { animation-delay: 0.3s; }
    .waveform.idle .bar:nth-child(11) { animation-delay: 0.2s; }
    .waveform.idle .bar:nth-child(12) { animation-delay: 0.1s; }
    .waveform.idle .bar:nth-child(13) { animation-delay: 0.0s; }

    @keyframes breath {
      0%, 100% { height: 3px;  opacity: 0.3; }
      50%       { height: 14px; opacity: 0.6; }
    }

    /* ── Loading dots ─────────────────────────────────────────── */
    .dots {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-top: 14px;
    }

    .dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      animation: dotPulse 1.3s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.25; }
      40%            { transform: scale(1);   opacity: 1;    }
    }

    /* ── Result ───────────────────────────────────────────────── */
    .result-text {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.88);
      -webkit-app-region: no-drag;
      user-select: text;
      cursor: text;
      word-break: break-word;
    }

    /* ── Partial live text (during recording) ─────────────────── */
    .partial-text {
      margin-top: 10px;
      font-size: 12.5px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
      -webkit-app-region: no-drag;
    }

    /* ── Preview actions ──────────────────────────────────────── */
    .preview-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      -webkit-app-region: no-drag;
    }

    .btn {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.12s;
    }

    .btn:hover  { opacity: 0.8; }
    .btn:active { opacity: 0.6; }

    .btn-paste    { background: #30d158; color: #000; }
    .btn-dismiss  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); }

    .hint {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.06em;
      -webkit-app-region: no-drag;
    }

    /* ── Hidden ───────────────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="root">
    <div class="panel entering" id="panel">

      <!-- Loading model state -->
      <div id="s-loading">
        <div class="status-row">
          <div class="dot dot-idle"></div>
          <span class="status-label">Loading model</span>
        </div>
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Recording state -->
      <div id="s-recording" class="hidden">
        <div class="status-row">
          <div class="dot dot-record"></div>
          <span class="status-label">Recording</span>
        </div>
        <div class="waveform idle" id="waveform">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="partial-text hidden" id="partial-text"></div>
      </div>

      <!-- Transcribing state -->
      <div id="s-transcribing" class="hidden">
        <div class="status-row">
          <div class="dot dot-process"></div>
          <span class="status-label">Transcribing</span>
        </div>
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Correcting state -->
      <div id="s-correcting" class="hidden">
        <div class="status-row">
          <div class="dot dot-correct"></div>
          <span class="status-label">Correcting</span>
        </div>
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Preview state: user confirms before paste -->
      <div id="s-preview" class="hidden">
        <div class="status-row">
          <div class="dot dot-done"></div>
          <span class="status-label">Preview</span>
        </div>
        <div class="result-text" id="preview-text"></div>
        <div class="preview-actions">
          <button class="btn btn-dismiss" id="btn-dismiss">Dismiss</button>
          <button class="btn btn-paste" id="btn-paste">Paste</button>
        </div>
        <div class="hint">⌃⌃ to paste</div>
      </div>

      <!-- Result state -->
      <div id="s-result" class="hidden">
        <div class="status-row">
          <div class="dot dot-done"></div>
          <span class="status-label">Pasted</span>
        </div>
        <div class="result-text" id="result-text"></div>
      </div>

    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
